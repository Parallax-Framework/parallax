name: Generate Version JSON

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate version JSON
        id: generate_version
        run: |
          VALID_COUNT=0
          for COMMIT in $(git rev-list --reverse --since="2025-07-18" HEAD); do
              AUTHOR=$(git show -s --format='%ae' $COMMIT)
              PARENTS=$(git rev-list --parents -n 1 $COMMIT | wc -w)

              if [[ "$AUTHOR" != "github-actions@github.com" && "$PARENTS" -lt 3 ]]; then
                  VALID_COUNT=$((VALID_COUNT + 1))
              fi
          done

          # Versioning format:
          # < 100       => 0.0.X
          # 100–999     => 0.X.Y
          # 1000+       => X.Y.Z
          if (( VALID_COUNT < 100 )); then
              MAJOR=0
              MINOR=0
              PATCH=$VALID_COUNT
          elif (( VALID_COUNT < 1000 )); then
              MAJOR=0
              MINOR=$((VALID_COUNT / 100))
              PATCH=$((VALID_COUNT % 100))
          else
              MAJOR=$((VALID_COUNT / 1000))
              MINOR=$(((VALID_COUNT % 1000) / 100))
              PATCH=$((VALID_COUNT % 100))
          fi

          PATCH_PADDED=$(printf "%02d" $PATCH)
          VERSION="$MAJOR.$MINOR.$PATCH_PADDED"

          echo "{" > version.json
          echo "  \"version\": \"$VERSION\"," >> version.json
          echo "  \"commitCount\": $VALID_COUNT," >> version.json
          echo "  \"commitHash\": \"$(git rev-parse --short HEAD)\"," >> version.json
          echo "  \"branch\": \"main\"" >> version.json
          echo "}" >> version.json

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit and push version file
        id: commit_version
        run: |
          git add -f version.json

          if git diff --cached --quiet; then
            echo "No changes to version file. Skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "[skip ci] [ci version bump] Update version.json"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.commit_version.outputs.changed == 'true'
        id: tag_version
        run: |
          TAG="v${{ steps.generate_version.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping tag creation."
            exit 0
          fi

          git tag -a "$TAG" -m "Parallax $TAG"
          git push origin "$TAG"

      - name: Generate AI Release Summary
        if: steps.commit_version.outputs.changed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "${{ steps.tag_version.outputs.tag }}" | head -n 1)
          
          # Generate release notes using GitHub CLI
          if [ -z "$PREVIOUS_TAG" ]; then
            RELEASE_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ steps.tag_version.outputs.tag }}" \
              --jq '.body')
          else
            RELEASE_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ steps.tag_version.outputs.tag }}" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              --jq '.body')
          fi
          
          # Prepare the prompt for OpenAI
          PROMPT="Please generate a concise, professional summary of the following release notes for the Parallax gamemode for Garry's Mod. Focus on the key features, improvements, and bug fixes. Keep it engaging and user-friendly:\n\n$RELEASE_NOTES"
          
          # Call OpenAI API to generate summary
          AI_SUMMARY=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a helpful assistant that creates concise, engaging release summaries for game development projects."
                },
                {
                  "role": "user",
                  "content": "'"$(echo "$PROMPT" | jq -Rs .)"'"
                }
              ],
              "temperature": 0.7,
              "max_tokens": 500
            }' | jq -r '.choices[0].message.content')
          
          # Create the release notes file with AI summary and full changelog
          {
            echo "$AI_SUMMARY"
            echo ""
            echo "---"
            echo ""
            echo "## Full Changelog"
            echo ""
            echo "$RELEASE_NOTES"
          } > ai_notes.md

      - name: Create GitHub release
        if: steps.commit_version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.tag }}
          name: Parallax ${{ steps.tag_version.outputs.tag }}
          body_path: ai_notes.md
          generate_release_notes: true
